# ============================================================
# 快速測試設定（使用 edge/video/ 裡的影片）
# ============================================================
#
# 使用方式：
#   python quick_test/run.py
#   python quick_test/run.py --video edge/video/40.mp4
#   python quick_test/run.py --video edge/video/50.mp4
#
# 影片來源：edge/video/30.mp4（預設）
# 推論模型：dummy（不需要 GPU）

mode: test

# --- Signaling Server（本機） ---
signaling_host: "0.0.0.0"
signaling_port: 8080

# --- Edge Device（使用 edge/video/ 裡的影片） ---
edge:
  id: "edge-001"
  capture:
    mode: "video"
    source: "edge/video/30.mp4"   # ← 預設用 30.mp4；run.py 可覆蓋此路徑
    fps: 5
    width: 640
    height: 480
  preprocess:
    roi:
      enabled: false
      x: 0
      y: 0
      width: 640
      height: 480
    jpeg_quality: 80
    resize_width: 0
    resize_height: 0
  signaling:
    url: "ws://localhost:8080/ws"
  ice_servers: []
  failover:
    health_check_interval: 2.0
    max_failures: 3
    recovery_delay: 3.0

# --- Dispatchers（本機兩個 process） ---
dispatchers:
  - id: "dispatcher-001"
    signaling:
      url: "ws://localhost:8080/ws"
    inference_ws_url: "ws://localhost:8765/ws"
    ice_servers: []

  - id: "dispatcher-002"
    signaling:
      url: "ws://localhost:8080/ws"
    inference_ws_url: "ws://localhost:8765/ws"
    ice_servers: []

# --- Inference Server（dummy model） ---
inference:
  id: "inference-001"
  host: "0.0.0.0"
  port: 8765
  model_type: "dummy"   # 不需要 GPU，回傳假偵測結果驗證管線
  model_path: ""
  device: "cpu"
