# ============================================================
# Staging 部署測試（Pi → EC2 → 桌機），但用影片代替攝影機
# ============================================================
#
# 目的：在 Pi 真實連到 EC2 dispatcher / 桌機 inference 的前提下，
#       先用 edge/video/*.mp4 驗證整條網路鏈路 + Keras 模型推論，
#       再切到攝影機。
#
# 與 staging.yaml 的差異：
#   - capture: camera → video（讀 edge/video/30.mp4）
#   - preprocess: 換成 1920×1080 針筒影片用的 ROI / resize
#   - 其餘（signaling / dispatchers / inference）跟 staging.yaml 完全一致
#
# 使用方式（在 Pi 上）：
#   python edge/main.py --config config/staging_video.yaml
#   python edge/main.py --config config/staging_video.yaml --source edge/video/40.mp4
#
# 想換攝影機就切回 staging.yaml：
#   python edge/main.py --config config/staging.yaml

mode: staging

# --- Signaling Server (EC2 Elastic IP) ---
signaling_host: "0.0.0.0"
signaling_port: 8080

# --- Edge (用影片代替攝影機) ---
edge:
  id: "edge-rpi-001"
  capture:
    mode: "video"                        # ← 與 staging.yaml 唯一差別 1
    source: "edge/video/30.mp4"          # ← 與 staging.yaml 唯一差別 2
    fps: 5                               # 影片本身就 5 fps，配合即可
    width: 1920                          # video 模式下 OpenCV 忽略，但留著作為記錄
    height: 1080
  preprocess:                            # ← 與 staging.yaml 唯一差別 3：改用針筒影片的 ROI
    roi:
      enabled: true
      x: 800
      y: 528
      width: 176
      height: 550
    jpeg_quality: 80
    resize_width: 88
    resize_height: 275
  signaling:
    url: "ws://18.178.31.155:8080/ws"    # 與 staging.yaml 相同
  ice_servers:
    - urls: "stun:stun.l.google.com:19302"
  failover:
    health_check_interval: 2.0
    max_failures: 3
    recovery_delay: 3.0

# --- Dispatchers (與 staging.yaml 完全相同) ---
dispatchers:
  - id: "dispatcher-ec2-001"
    signaling:
      url: "ws://18.178.31.155:8080/ws"
    inference_ws_url: "ws://mawatarilab-inference.tail4c41d4.ts.net:8765/ws"
    ice_servers:
      - urls: "stun:stun.l.google.com:19302"
  - id: "dispatcher-ec2-002"
    signaling:
      url: "ws://18.178.31.155:8080/ws"
    inference_ws_url: "ws://mawatarilab-inference.tail4c41d4.ts.net:8765/ws"
    ice_servers:
      - urls: "stun:stun.l.google.com:19302"

# --- Inference (與 staging.yaml 完全相同) ---
inference:
  id: "inference-laptop-001"
  host: "0.0.0.0"
  port: 8765
  model_type: "keras"
  model_path: "output_model_v1_0.25_ori.h5"
  device: "cpu"
