mode: staging
# 或 mode: production  （看你 code 裡怎麼判斷）

# --- Signaling Server ---
signaling_host: "0.0.0.0"
signaling_port: 8080

# --- Edge ---
# 解析度設為 1920×1080，理由：
#   1. Keras 模型訓練資料、h5_test.yaml、edge/video/*.mp4 都是 1080p
#   2. ROI 座標 (800, 528, 176×550) 可直接沿用，不必重新選
#   3. 攝影機 MJPG 1080p 支援到 30 fps，10 fps 完全夠用
edge:
  id: "edge-rpi-001"
  capture:
    mode: "camera"
    source: "0"
    fps: 10
    width: 1920
    height: 1080
  preprocess:
    roi:
      enabled: true
      x: 800                      # 與 h5_test.yaml / staging_video.yaml 完全一致
      y: 528
      width: 176
      height: 550
    jpeg_quality: 85
    resize_width: 88              # 模型期望輸入：(275, 88, 3)
    resize_height: 275
  signaling:
    url: "ws://18.178.31.155:8080/ws"     # ← 改成 ws:// + EIP
  ice_servers:
    - urls: "stun:stun.l.google.com:19302"
    # ExpressTURN 免費帳號（每月 1 GB 流量，demo 夠用）
    # ⚠️ 這組 credential 是個人專屬，請不要把這份 yaml 推到公開 repo
    # 三台都要用同一組（edge + 兩台 dispatcher）
    - urls: "turn:free.expressturn.com:3478"
      username: "000000002091512770"
      credential: "mAXjlHRRVDrvWOr/Eo+YPmLHsPA="
    # 加一條走 TCP 的，給 5G 行動網路 UDP 被卡時用
    - urls: "turn:free.expressturn.com:3478?transport=tcp"
      username: "000000002091512770"
      credential: "mAXjlHRRVDrvWOr/Eo+YPmLHsPA="
  failover:
    health_check_interval: 2.0
    max_failures: 3
    recovery_delay: 3.0

# --- Dispatchers ---
dispatchers:
  - id: "dispatcher-ec2-001"
    signaling:
      url: "ws://18.178.31.155:8080/ws"   # ← 改成 ws:// + EIP
    inference_ws_url: "ws://mawatarilab-inference.tail4c41d4.ts.net:8765/ws"  # ← 暫時用內網 IP，之後換 Tailscale
    ice_servers:
      - urls: "stun:stun.l.google.com:19302"
      - urls: "turn:free.expressturn.com:3478"
        username: "000000002091512770"
        credential: "mAXjlHRRVDrvWOr/Eo+YPmLHsPA="
      - urls: "turn:free.expressturn.com:3478?transport=tcp"
        username: "000000002091512770"
        credential: "mAXjlHRRVDrvWOr/Eo+YPmLHsPA="
  - id: "dispatcher-ec2-002"
    signaling:
      url: "ws://18.178.31.155:8080/ws"
    inference_ws_url: "ws://mawatarilab-inference.tail4c41d4.ts.net:8765/ws"
    ice_servers:
      - urls: "stun:stun.l.google.com:19302"
      - urls: "turn:free.expressturn.com:3478"
        username: "000000002091512770"
        credential: "mAXjlHRRVDrvWOr/Eo+YPmLHsPA="
      - urls: "turn:free.expressturn.com:3478?transport=tcp"
        username: "000000002091512770"
        credential: "mAXjlHRRVDrvWOr/Eo+YPmLHsPA="

# --- Inference ---
inference:
  id: "inference-laptop-001"
  host: "0.0.0.0"
  port: 8765
  model_type: "keras"
  model_path: "output_model_v1_0.25_ori.h5"
  device: "cpu"